{
    "output": ["eDP-1"],
    "spacing": 4,
		// try to keep it 4px across the config
    "height":33,
    // "margin-left": 4,
    // "margin-right": 4,
    // "margin-top": 4,
    // "margin-radius": 4,
    // "layer": "top",
    "modules-left": [ "custom/space","custom/menu", "custom/appswitch", "ext/workspaces" ],
    "modules-right": ["cpu", "memory", "battery", "clock", "network#net1", "pulseaudio", "custom/session","custom/space2"],
    "battery": {
        "format": "{icon} {capacity}% ",
	"interval": 10,
    },
   
	"custom/menu": {
        "format":"              ",
        "tooltip": false,
        "on-click": "/home/void/.sh/wenu",
        "on-click-middle": "pkill fuzzel",
        "on-click-right": "pkill fuzzel",
    },

	"custom/appswitch": {
        "format":"   App Switcher   ",
        "tooltip": false,
        "on-click": "/home/void/.sh/appswitch",
        "on-click-middle": "pkill fuzzel",
        "on-click-right": "pkill fuzzel",
        "on-scroll-up": "wtype -M logo -k 8 -m logo",
        "on-scroll-down": "wtype -M logo -k 9 -m logo",
    },

   "ext/workspaces": {
    "format": "   {name}   ",
    "sort-by-id": true,
    "on-click": "activate",
    "on-scroll-up": "wtype -M logo -k 8 -m logo",
    "on-scroll-down": "wtype -M logo -k 9 -m logo",
   },


  "clock": {
  "timezone": "America/Sao_Paulo",
  "tooltip-format": "<big>[{:%Y %B}]</big>\n<tt><small>{calendar}</small></tt>",
  "format": "пЃі  {:%A %d %B %Y    пЂ—  %T}",
	"interval": 1,
	"on-click": "gsimplecal",
    },

  "cpu": {
  "format": "п‹›  {usage}%",
  "on-click": "foot -a SmartTerm -e htop -u void",
	"interval": 1,
    },

    "memory": {
        "format": "п”ё {percentage}%",
        "on-click": "lxtask",
	"interval": 1,
    },

    "battery": {
	"bat": "BAT0",
        "format": "пѓ§ {capacity}%",
	"interval": 1,
    },

    "battery#bat1": {
	"bat": "BAT1",
        "format": "пѓ§ {capacity}%",
	"interval": 1,
    },

    "pulseaudio": {
        "format": "{icon} {volume}%",
        "format-bluetooth": "{icon}пЉ” {volume}%",
        "format-muted": "пЂ¦",
        "format-icons": {
             "headphones": "пЂҐ",
             "handsfree": "п–ђ",
             "headset": "п–ђ",
             "phone": "п‚•",
             "portable": "п‚•",
             "car": "п†№",
             "default": ["пЂ§", "пЂЁ"]
            },               

        "on-scroll-up": "wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+; pkill -x -RTMIN+11 waybar",
        "on-scroll-down": "wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-; pkill -x -RTMIN+11 waybar",
        "on-click": "pavucontrol",
    },

     "network#net1": {
     // "interface": "wlp2s0",
     "format": "{ifname}",
     "format-wifi": "п‡« {signalStrength}%",
     "format-ethernet": "п›ї ",
     "format-disconnected": "", //An empty format will hide the module.
     "format-disconnected": "п”њ",
     "tooltip-format": "{ifname}",
     "tooltip-format-wifi": " п‡« {essid} ({signalStrength}%)  ",
     "tooltip-format-ethernet": "п›ї",
     "tooltip-format-disconnected": "Disconnected",
     "interval": 1,
     "on-click": "iwgtk"
     },

	"custom/session": {
        "format": " вЏ»  ",
        "tooltip": false,
        "on-click": "/home/void/.config/labwc/wsession",
        "on-click-right": "pkill fuzzel",
        "on-click-middle": "wlrctl window close",
    },

	"custom/space": {
        "format": "  ",
        "tooltip": false,
     },

	"custom/space2": {
        "format": "",
        "tooltip": false,
     },
}
