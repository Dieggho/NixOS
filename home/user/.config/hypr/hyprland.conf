# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,1

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
debug:disable_logs = false

# Execute your favorite apps at launch
exec-once = awww-daemon & mako & reloadwaybar & hyprbar & 
exec-once = dbus-update-activation-environment --systemd --all &

# Source a file (multi-file configs)
source = ~/.config/hypr/themes/space-dark.conf


# Some default env vars.
env = XCURSOR_SIZE,24
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland 

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = br,us
    kb_variant =
    kb_model = thinkpad
    kb_options =
    kb_rules =
    kb_options = grp:win_space_toggle

    follow_mouse = 0

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

cursor {
    no_warps = true
    enable_hyprcursor = true
    sync_gsettings_theme = true
}

animations {
    enabled = true

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = borderangle, 0, 49, linear, loop
    animation = fade, 1, 7, default
    animation = workspaces, 1, 7, default

}

dwindle {
    preserve_split = true # You probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_status = master
    allow_small_split = true
    special_scale_factor = .80
    mfact = .50
    #inherit_fullscreen = false
}

gestures {
    gesture = 3, horizontal, workspace
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    enable_swallow = true
    disable_splash_rendering = true
    vrr = 1
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device:epic-mouse-v1 {
    #sensitivity = 0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = Mod5

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, foot
bind = $mainMod, K, killactive, 
bind = $mainMod, Delete, exit, 
bind = $mainMod, D, exec, pcmanfm 
bind = $mainMod, Space, togglefloating, 
bind = $mainMod, P, exec, fuzzel 
bind = $mainMod, Z, pseudo, # dwindle
#bind = $mainMod, X, togglesplit, # dwindle
bind = $mainMod, T, exec, Telegram
bind = $mainMod, B, exec, waypaper

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = SUPER, S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


####
bind = Alt_L, K, killactive, 
bind = SUPER, T, exec, foot -a SmartTerm 
bind = Alt_L, Return, exec, foot
bind = Alt_L, P, exec, fuzzel 
bind=,Print,exec,screenshot
bind=SHIFT,Print,exec,wlshot
bind=SUPER,F,fullscreen, 1 
bind=SUPER,U,exec,setlayout us
bind=$mainMod, F, fullscreen
bind=SUPER,B,exec,setlayout br
bind=SUPER,SPACE,exec,nwg-drawer -mb 130 -mt 18 -ml 170 -mr 170
bind=SUPER,W,exec,reloadwaybar
bind = $mainMod, M, exec, hyprctl keyword general:layout master
bind = $mainMod, N, exec, hyprctl keyword general:layout dwindle

## Exit
 bind=SUPER,M,exit

