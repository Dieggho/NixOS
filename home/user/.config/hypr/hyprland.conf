#windowrulev2 = plugin:hyprbars:title_color,class:^(*)$
windowrulev2 = plugin:hyprbars:nobar,class:^(dev.benz.walker)$
windowrulev2 = plugin:hyprbars:nobar,class:^(gsimplecal)$ 

windowrulev2 = float,class:^(SmartTerm)$
windowrulev2 = float,class:^(dev.benz.walker)$
windowrulev2 = float,class:^(nwg-look)$
windowrulev2 = fullscreen,class:^(nwg-drawer)$
windowrulev2 = float,class:^(galculator)$
windowrulev2 = float,class:^(lxtask)$
windowrulev2 = float,class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = float,class:^(dconf-editor)$
windowrulev2 = float,class:^(waypaper)$
