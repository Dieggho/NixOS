{
    "output": ["eDP-1"],
    "spacing": 4,
    "position":"bottom",
    // try to keep it 4px across the config
    "height":33,
    //"margin-left": 6,
    //"margin-right": 6,
    //"margin-top": 6,
    //"margin-bottom": 6,
    //"margin-radius": 20,
    //"layer": "top",
    "modules-left": ["custom/keys","hyprland/window"],
    "modules-center": [],
    "modules-right": ["custom/grab","custom/alsa"],
    "battery": {
        "format": "{icon} {capacity}% ",
	"interval": 10,
    },
   
        "custom/alsa": {
        "format": "",
        "tooltip": false,
        "on-click": "expo",
        "on-click-right": "hyprctl dispatch hyprexpo:expo off",
    },

     "hyprland/window":{
     "on-click-middle": "hyprctl dispatch killactive",
     "on-scroll-up": "hyprctl dispatch movefocus u",
     "on-scroll-down": "hyprctl dispatch movefocus ",
     "on-click": "sleep 0.1 && top_level_mgr",
     "on-click-right": "sleep 0.1 && move_top_level_to",
     "max-length": 100,
     "width" : 0,
     },

    "custom/keys": {
        "format": "",
        "on-click": "hyprctl dispatch movetoworkspace special:magic && hyprctl dispatch togglespecialworkspace magic",
        "on-click-right": "hyprctl dispatch togglespecialworkspace magic",
        "signal": 11,
        "interval": 1,
        "tooltip": false
    },

	"custom/grab": {
        "exec": "grabstatus",
        "tooltip": false,
        "on-click": "grab unbind",
        "on-click-right": "grab bindm",
        "signal": 11,
        "interval": 1,
    },

	"custom/session": {
        "format": "      ",
        "tooltip": false,
        "on-click": "hyprctl dispatch hyprexpo:expo toggle",
        "on-click-right": "hyprctl dispatch hyprexpo:expo off",
    },
}
